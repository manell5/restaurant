<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réservation - Nocturne</title>
    <link rel="stylesheet" href="styleRV.css" />
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
  </head>
  <body>
    <div class="container">
      <h1>Nocturne</h1>
      <form id="reservationForm">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required />

        <label for="phone">Téléphone :</label>
        <input type="tel" id="phone" name="phone" required />

        <label for="date">Date :</label>
        <input type="date" id="date" name="date" required />

        <label for="time">Heure :</label>
        <input type="time" id="time" name="time" required />

        <label for="guests">Nombre de personnes :</label>
        <select id="guests" name="guests" required>
          <option value="1">1 personne</option>
          <option value="2">2 personnes</option>
          <option value="3">3 personnes</option>
          <option value="4">4 personnes</option>
          <option value="5">5 personnes</option>
          <option value="6">6 personnes</option>
        </select>

        <label for="message">Message spécial :</label>
        <textarea id="message" name="message" rows="4"></textarea>

        <button type="submit">Réserver</button>
      </form>
      <div class="confirmation" id="confirmationMessage">
        Merci ! Votre réservation a été envoyée.
      </div>
    </div>

    <script>
      document
        .getElementById("reservationForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          document.getElementById("confirmationMessage").style.display =
            "block";
          setTimeout(function () {
            document.getElementById("reservationForm").reset();
            document.getElementById("confirmationMessage").style.display =
              "none";
          }, 3000);
        });
    </script>
  </body>
</html>
