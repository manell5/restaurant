<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <title>Accueil - Nocturne</title>
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <link
      rel="icon"
      href="./images/99-films-yr9l_xQPDL0-unsplash.jpg"
      type="image/jpg"
    />
    <link href="./style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
    />
  </head>
  <body>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <header>
      <h1 class="unselectable">Nocturne</h1>
      <div class="login-button">
        <a href="/auth"> <ion-icon size="large" name="person"></ion-icon></a>
      </div>
    </header>

    <div class="image-container">
      <div class="navbar-button">
        <a class="navbar-link" href="/">Accueil</a>
        <a class="navbar-link" href="/menu">Menu</a>
        <a class="navbar-link" href="" id="openReservationModal">Réserver</a>
        <a class="navbar-link" href="/evenements">Événements</a>
        <a class="navbar-link" href="/commande">commander</a>
      </div>
    </div>

    <!-- Fenêtre modale pour la réservation -->
    <div id="reservationModal" class="modal">
      <div class="modal-content">
        <h2 class="modal-title">Nocturne</h2>
        <span class="close">&times;</span>
        <h2>Formulaire de Réservation</h2>
        <form id="reservationForm">
          <label for="name">Nom :</label>
          <input type="text" id="name" required />

          <label for="email">Email :</label>
          <input type="email" id="email" required />

          <label for="phone">Téléphone :</label>
          <input type="tel" id="phone" required />

          <label for="date">Date :</label>
          <input type="date" id="date" required />

          <label for="time">Heure :</label>
          <input type="time" id="time" required />

          <label for="guests">Nombre de personnes :</label>
          <select id="guests" required>
            <option value="1">1 personne</option>
            <option value="2">2 personnes</option>
            <option value="3">3 personnes</option>
            <option value="4">4 personnes</option>
            <option value="5">5 personnes</option>
          </select>

          <label for="message">Message spécial :</label>
          <textarea id="message" rows="4"></textarea>

          <button type="submit">Envoyer</button>
        </form>
      </div>
    </div>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <!-- Wrap the navigation in a mobile-only container -->
    <div class="mobile-nav-container">
      <div class="nav-container">
        <div class="nav-item">
          <a href="/index.html"><i class="fas fa-home"></i></a>
        </div>
        <div class="nav-item">
          <a href="/auth"><i class="fas fa-user"></i></a>
        </div>
        <div class="nav-item">
          <a href="/commandeSettings"><i class="fas fa-cog"></i></a>
        </div>
        <div class="nav-item">
          <a href="/contactezNous"><i class="fas fa-envelope"></i></a>
        </div>
        <div class="nav-item">
          <a href="/menu"><i class="fa-solid fa-book"></i></a>
        </div>
        <div class="nav-item">
          <a href="/evenements"><i class="fas fa-utensils"></i></a>
        </div>
        <div class="nav-item">
          <a href="/commande"><i class="fas fa-shopping-cart"></i></a>
        </div>

        <div class="center-btn" id="menuToggle">
          <i class="fas fa-plus"></i>
        </div>
      </div>
    </div>
    <script src="script.js" type="module"></script>
  </body>
</html>
